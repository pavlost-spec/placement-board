<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Board</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--border:#e2e5ea;--text:#1a1d23;--muted:#8a929f;--neo:#6366f1;--crown:#ec4899;--guns:#0ea5e9;--evo:#f59e0b}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity .3s}
.loader.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--neo);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--muted);font-family:"DM Mono",monospace}

.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;color:var(--neo);letter-spacing:.08em;white-space:nowrap;display:flex;align-items:center;gap:8px}
.month-select{font-family:"DM Mono",monospace;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;outline:none}
.month-select:hover{border-color:#b0b7c3}
.filters{display:flex;gap:8px;flex-wrap:wrap;flex:1;align-items:center}
.flabel{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:500;white-space:nowrap}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.pill{font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:#b0b7c3;color:var(--text)}
.pill.active{color:#fff}
.pill.b-neo.active{background:var(--neo);border-color:var(--neo)}
.pill.b-crown.active{background:var(--crown);border-color:var(--crown)}
.pill.b-guns.active{background:var(--guns);border-color:var(--guns)}
.pill.b-evo.active{background:var(--evo);border-color:var(--evo)}
.pill.geo.active,.pill.cat.active{background:#eef0f4;border-color:#c8cdd6;color:var(--text)}
.dup-btn{font-size:11px;font-weight:600;padding:4px 13px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.dup-btn:hover{border-color:#b0b7c3;color:var(--text)}
.dup-btn.on{background:#f59e0b;border-color:#f59e0b;color:#fff}
.col-btn,.refresh-btn{font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.col-btn:hover,.refresh-btn:hover{border-color:#b0b7c3;color:var(--text)}
.statbar{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);white-space:nowrap;display:flex;gap:10px;align-items:center}
.sv{color:#374151;font-weight:600}.se{color:#16a34a;font-weight:600}.sd{color:#b45309;font-weight:600}
.legend{display:flex;gap:10px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-f{width:13px;height:13px;border-radius:3px;background:#e9eaec;border:1px solid #d1d5db;flex-shrink:0}
.leg-e{width:13px;height:13px;border-radius:3px;background:#dcfce7;border:1px solid #86efac;flex-shrink:0}

.main{padding:20px 20px 60px}
.brand-block{margin-bottom:10px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#fff}
.brand-hdr{display:flex;align-items:center;gap:10px;padding:11px 16px;border-left:4px solid var(--bcolor,var(--neo));background:#fff;cursor:pointer;user-select:none;transition:background .12s}
.brand-hdr:hover{background:#f9fafb}
.chevron{font-size:12px;color:var(--muted);margin-left:auto;transition:transform .2s}
.brand-block.collapsed .chevron{transform:rotate(-90deg)}
.brand-name{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--bcolor,var(--neo))}
.brand-stat{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}
.brand-dups{font-size:11px;color:#b45309;font-family:"DM Mono",monospace;font-weight:600}
.brand-prog-wrap{max-width:80px;height:3px;background:#f0f1f4;border-radius:2px;overflow:hidden;flex:1}
.brand-prog-fill{height:100%;border-radius:2px;opacity:.5;transition:width .3s}
.brand-body{padding:14px 16px 16px;border-top:1px solid var(--border);overflow:hidden;transition:max-height .25s ease,opacity .2s ease,padding .25s ease;max-height:9999px;opacity:1}
.brand-block.collapsed .brand-body{max-height:0;opacity:0;padding-top:0;padding-bottom:0;border-top:none}
.collapsed-summary{display:none;gap:6px;flex-wrap:wrap;align-items:center}
.brand-block.collapsed .collapsed-summary{display:flex}
.brand-block.collapsed .brand-prog-wrap{display:none}
.cs-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-family:"DM Mono",monospace}
.cs-filled{background:#e9eaec;color:#374151}.cs-empty{background:#dcfce7;color:#16a34a}.cs-dup{background:#fef9c3;color:#b45309}
.geo-sec{margin-bottom:18px}
.geo-lbl{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:"DM Mono",monospace;padding:3px 8px;border:1px solid var(--border);border-radius:4px;margin-bottom:8px}
.geo-dot{width:5px;height:5px;border-radius:50%;background:var(--bcolor,var(--neo));flex-shrink:0}
.cat-block{margin-bottom:10px}
.cat-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cat-name{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);min-width:80px}
.cat-prog{flex:1;height:2px;background:var(--border);border-radius:1px;overflow:hidden;max-width:100px}
.cat-prog-fill{height:100%;border-radius:1px;background:#9ca3af;transition:width .3s}
.cat-cnt{font-size:10px;font-family:"DM Mono",monospace;color:var(--muted)}
.slot-grid{display:flex;flex-wrap:wrap;gap:5px}
.slot{width:118px;min-height:58px;border-radius:6px;padding:8px 10px 8px 13px;position:relative;transition:transform .12s,box-shadow .12s,opacity .2s;cursor:default}
.slot:hover{transform:translateY(-2px);z-index:2}
.slot.filled{background:#e9eaec;border:1px solid #d1d5db;border-left:3px solid var(--bcolor,var(--neo))}
.slot.filled:hover{box-shadow:0 4px 14px rgba(0,0,0,.1)}
.slot.filled .slot-num{color:#b0b7c3}
.slot.filled .slot-site{color:#9ca3af}
.slot.filled .slot-game{font-size:10px;font-weight:600;color:#1f2937;line-height:1.3}
.slot.filled .slot-prov{font-size:9px;color:#6b7280;font-family:"DM Mono",monospace;margin-top:3px}
.slot.empty{background:#dcfce7;border:1px solid #86efac;border-left:3px solid #22c55e}
.slot.empty:hover{box-shadow:0 4px 14px rgba(34,197,94,.15)}
.slot.empty .slot-num{color:#86efac}
.slot.empty .slot-site{color:#4ade80}
.slot.empty .slot-free{font-size:11px;font-weight:600;color:#16a34a;margin-top:8px}
body.dup-mode .slot.filled.is-dup{background:#fef9c3;border-color:#f59e0b;border-left:3px solid #d97706;box-shadow:0 0 0 2px rgba(245,158,11,.2)}
body.dup-mode .slot.filled.is-dup .slot-game{color:#92400e}
body.dup-mode .slot.filled.is-dup .slot-prov{color:#b45309}
body.dup-mode .slot.filled.is-dup .slot-num{color:#fbbf24}
body.dup-mode .slot.filled.is-dup .slot-site{color:#d97706}
body.dup-mode .slot.filled:not(.is-dup){opacity:.3}
body.dup-mode .slot.empty{opacity:.3}
.dup-badge{position:absolute;top:5px;left:5px;font-size:8px;font-weight:700;background:#f59e0b;color:#fff;border-radius:3px;padding:1px 4px;font-family:"DM Mono",monospace;opacity:0;pointer-events:none;transition:opacity .15s}
body.dup-mode .slot.filled.is-dup .dup-badge{opacity:1}
.slot-num{position:absolute;top:5px;right:7px;font-size:8px;font-family:"DM Mono",monospace}
.slot-site{font-size:8px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.error-msg{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;font-family:"DM Mono",monospace;line-height:2}
.empty-state{text-align:center;padding:60px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-text" id="loaderText">Завантаження даних...</div>
</div>

<div class="topbar">
  <div class="logo">
    ♟ PLACEMENT
    <select class="month-select" id="monthSelect" onchange="loadMonth(this.value)"></select>
  </div>
  <div class="filters">
    <span class="flabel">Бренд</span>
    <div id="bf" style="display:flex;gap:4px"></div>
    <div class="sep"></div>
    <span class="flabel">ГЕО</span>
    <div id="gf" style="display:flex;gap:4px;flex-wrap:wrap"></div>
    <div class="sep"></div>
    <span class="flabel">Категорія</span>
    <div id="cf" style="display:flex;gap:4px;flex-wrap:wrap"></div>
    <div class="sep"></div>
    <button class="dup-btn" id="dupBtn" onclick="toggleDups()">⚑ Повтори</button>
    <button class="col-btn" id="colBtn" onclick="toggleAllCollapse()">↕ Згорнути все</button>
    <button class="refresh-btn" onclick="refreshData()">↻</button>
    <div class="sep"></div>
    <div class="legend">
      <div class="leg"><div class="leg-f"></div>Зайнято</div>
      <div class="leg"><div class="leg-e"></div>Вільно</div>
    </div>
  </div>
  <div class="statbar" id="sb">—</div>
</div>

<div class="main" id="board"></div>

<script>
const SHEET_ID='1dXEUG_S5CCuyxOwofFFOraCDawDqWdGx0t-iM3aO3Cc';
const MONTH_GIDS={"Март 2026": "198055218", "Февраль 2026": "1244716984", "Январь 2026": "85613550", "Декабрь 2025": "1457575440"};
const BC={Neospin:'#6366f1',Crownslots:'#ec4899',Gunsbet:'#0ea5e9',Evospin:'#f59e0b'};
const MAIN_BRANDS=['Neospin','Crownslots','Gunsbet','Evospin'];
const CAT_ORDER=['Slots','Top','Bonus Buy','Jackpot','Original','Table Games','Live Casino'];
const SKIP_KW=['резерв','поставить','ella games','inout/ella'];

let currentMonth=Object.keys(MONTH_GIDS)[0];
let DATA={};
let activeBrands=new Set(MAIN_BRANDS);
let activeGeos=new Set(),activeCats=new Set();
let dupMode=false,allCollapsed=false,collapsedBrands=new Set();

// ── FETCH via Google Visualization API (works cross-origin) ──
const PROXY='https://script.google.com/macros/s/AKfycbyoztFLuxotWSC6qIaYju8wjpl0yMt_sCHaMyiphvYkvcw_r9Hkz-2v0qMAHWQMOO1UrQ/exec';
async function fetchSheetData(gid){
  const url=`${PROXY}?gid=${gid}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function cleanVal(v){
  if(v===null||v===undefined)return'';
  v=String(v).trim();
  if(v===''||v.toLowerCase()==='nan'||v==='#n/a'||v==='null'||v==='undefined')return'';
  if(/^\d+\.?\d*$/.test(v))return'';
  return v;
}
function norm(s){return s.toLowerCase().trim()}
function shorten(name){
  const rep=[['NEOSPIN','NEO'],['CROWNSLOTS','CROWN'],['GUNSBET','GUNS'],
    ['EVOSPIN','EVO'],['SLOTRUSH / BITSTAKE','SR/BS'],['BEONBET','BOB'],
    ['AUSTRALIA','AU'],['GERMANY','DE'],['CANADA','CA'],
    ['NEW ZEALAND','NZ'],['ORIGINALS','ORIG'],['Popular','Pop']];
  for(const[a,b]of rep)name=name.replace(a,b);
  return name.replace(/\s*\(.*?\)/g,'').trim();
}

function parseSheetData(rows){
  const headerRow=rows[0]||[];
  const placements={};
  // Auto-detect: find first column with a placement name (non-empty, non-numeric, not a fixed header)
  const FIXED_HEADERS=['бренд','категория','категорія','гео','локаль','менеджер','приоритет','пріоритет','сортировка','сортування'];
  let startCol=5;
  for(let i=0;i<headerRow.length;i++){
    const v=cleanVal(headerRow[i]).toLowerCase();
    if(!v)continue;
    if(FIXED_HEADERS.some(h=>v.includes(h)))continue;
    startCol=i;break;
  }
  for(let i=startCol;i<headerRow.length;i++){
    const v=cleanVal(headerRow[i]);
    if(v&&!/^\d+$/.test(v))placements[i]=v;
  }
  const tree={};
  const posCounter={};
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    const brand=cleanVal(row[0]);
    if(!brand||!MAIN_BRANDS.includes(brand))continue;
    const cat=cleanVal(row[1]);
    const locale=(cleanVal(row[2])||'ALL').toUpperCase();
    if(!tree[brand])tree[brand]={};
    if(!tree[brand][locale])tree[brand][locale]={};
    if(!tree[brand][locale][cat])tree[brand][locale][cat]=[];
    const key=`${brand}|${locale}|${cat}`;
    if(!posCounter[key])posCounter[key]=0;
    for(const[ci,pname]of Object.entries(placements)){
      const idx=parseInt(ci);
      const game=cleanVal(row[idx]);
      const prov=cleanVal(row[idx+1]);
      const isSkip=game&&SKIP_KW.some(k=>game.toLowerCase().includes(k));
      const finalGame=isSkip?'':game;
      posCounter[key]++;
      tree[brand][locale][cat].push({
        pos:posCounter[key],
        placement:pname,
        placement_short:shorten(pname),
        game:finalGame||'',
        provider:prov||'',
        filled:!!(finalGame),
      });
    }
  }
  return tree;
}

async function loadMonth(monthName){
  currentMonth=monthName;
  const gid=MONTH_GIDS[monthName];
  if(!gid){
    document.getElementById('board').innerHTML='<div class="error-msg">GID не знайдено для цього місяця</div>';
    return;
  }
  showLoader(`Завантаження: ${monthName}...`);
  try{
    const rows=await fetchSheetData(gid);
    DATA=parseSheetData(rows);
    buildFilters();
    render();
  }catch(e){
    document.getElementById('board').innerHTML=
      `<div class="error-msg">Помилка: ${e.message}<br><br>`+
      `Перевір що Sheet відкритий:<br>`+
      `Share → Anyone with the link → Viewer</div>`;
  }
  hideLoader();
}

function refreshData(){loadMonth(currentMonth)}

function buildFilters(){
  const allGeos=new Set(),allCats=new Set();
  for(const b of Object.keys(DATA))for(const g of Object.keys(DATA[b])){
    allGeos.add(g);for(const c of Object.keys(DATA[b][g]))allCats.add(c);}
  const sortedGeos=[...allGeos].sort((a,b)=>a==='ALL'?-1:b==='ALL'?1:a.localeCompare(b));
  const sortedCats=CAT_ORDER.filter(c=>allCats.has(c));
  activeGeos=new Set(sortedGeos);
  activeCats=new Set(sortedCats);
  const bf=document.getElementById('bf');bf.innerHTML='';
  for(const[brand,cls]of[['Neospin','b-neo'],['Crownslots','b-crown'],['Gunsbet','b-guns'],['Evospin','b-evo']]){
    if(!DATA[brand])continue;
    const btn=document.createElement('button');
    btn.className=`pill ${cls} active`;btn.textContent=brand;
    btn.onclick=()=>{
      if(activeBrands.has(brand)){if(activeBrands.size===1)return;activeBrands.delete(brand);btn.classList.remove('active')}
      else{activeBrands.add(brand);btn.classList.add('active')}render();};
    bf.appendChild(btn);
  }
  makePills('gf',sortedGeos,activeGeos,'geo');
  makePills('cf',sortedCats,activeCats,'cat');
}

function makePills(id,items,set,cls){
  const div=document.getElementById(id);div.innerHTML='';
  items.forEach(v=>{
    const btn=document.createElement('button');
    btn.className=`pill ${cls} active`;btn.textContent=v;
    btn.onclick=()=>{
      if(set.has(v)){if(set.size===1)return;set.delete(v);btn.classList.remove('active')}
      else{set.add(v);btn.classList.add('active')}render();};
    div.appendChild(btn);
  });
}

function toggleDups(){
  dupMode=!dupMode;
  const btn=document.getElementById('dupBtn');
  btn.classList.toggle('on',dupMode);
  btn.textContent=dupMode?'⚑ Повтори ON':'⚑ Повтори';
  document.body.classList.toggle('dup-mode',dupMode);
  document.querySelectorAll('.brand-dups').forEach(el=>el.style.display=dupMode?'inline':'none');
  document.querySelectorAll('.cs-dup').forEach(el=>el.style.display=dupMode?'inline':'none');
  updateStat();
}

function toggleAllCollapse(){
  allCollapsed=!allCollapsed;
  document.getElementById('colBtn').textContent=allCollapsed?'↕ Розгорнути все':'↕ Згорнути все';
  document.querySelectorAll('.brand-block').forEach(el=>{
    const b=el.dataset.brand;
    if(allCollapsed){collapsedBrands.add(b);el.classList.add('collapsed')}
    else{collapsedBrands.delete(b);el.classList.remove('collapsed')}
  });
}

function toggleCollapse(brand){
  const el=document.querySelector(`.brand-block[data-brand="${CSS.escape(brand)}"]`);
  if(!el)return;
  if(collapsedBrands.has(brand)){collapsedBrands.delete(brand);el.classList.remove('collapsed')}
  else{collapsedBrands.add(brand);el.classList.add('collapsed')}
}

function showLoader(msg){document.getElementById('loaderText').textContent=msg||'Завантаження...';document.getElementById('loader').classList.remove('hide')}
function hideLoader(){document.getElementById('loader').classList.add('hide')}

let _tF=0,_tE=0,_tD=0;
function updateStat(){
  const tot=_tF+_tE;
  const today=new Date().toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('sb').innerHTML=
    `<span class="sv">■ ${_tF}</span> зайнято · <span class="se">■ ${_tE}</span> вільно`
    +(dupMode?` · <span class="sd">⚑ ${_tD} повт.</span>`:'')
    +` · ${tot?Math.round(_tF/tot*100):0}%`
    +` <span style="margin-left:6px;color:var(--muted)">${today}</span>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(){
  const allCatsInData=new Set();
  for(const b of Object.keys(DATA))for(const g of Object.keys(DATA[b]))for(const c of Object.keys(DATA[b][g]))allCatsInData.add(c);
  const sortedGeos=[...activeGeos].sort((a,b)=>a==='ALL'?-1:b==='ALL'?1:a.localeCompare(b));
  const sortedCats=CAT_ORDER.filter(c=>allCatsInData.has(c)&&activeCats.has(c));
  let html='';_tF=0;_tE=0;_tD=0;
  for(const brand of MAIN_BRANDS){
    if(!activeBrands.has(brand)||!DATA[brand])continue;
    const col=BC[brand]||'#6366f1';
    const isCol=collapsedBrands.has(brand);
    const gameCount={};
    for(const geo of sortedGeos){if(!DATA[brand][geo])continue;
      for(const cat of sortedCats){if(!DATA[brand][geo][cat])continue;
        for(const s of DATA[brand][geo][cat])
          if(s.filled){const k=norm(s.game);gameCount[k]=(gameCount[k]||0)+1}}}
    const dupSet=new Set(Object.keys(gameCount).filter(k=>gameCount[k]>1));
    let bF=0,bT=0,bD=0;
    for(const g of sortedGeos){if(!DATA[brand][g])continue;
      for(const c of sortedCats){if(!DATA[brand][g][c])continue;
        for(const s of DATA[brand][g][c]){bT++;if(s.filled){bF++;if(dupSet.has(norm(s.game)))bD++;}}}}
    if(!bT)continue;
    _tD+=bD;
    const bPct=Math.round(bF/bT*100);
    html+=`<div class="brand-block${isCol?' collapsed':''}" data-brand="${esc(brand)}">
      <div class="brand-hdr" style="--bcolor:${col}" onclick="toggleCollapse('${brand}')">
        <span class="brand-name">${esc(brand)}</span>
        <span class="brand-stat">${bF}/${bT} · ${bPct}%</span>
        <span class="brand-dups" style="display:${dupMode?'inline':'none'}">· ${bD} повт.</span>
        <div class="brand-prog-wrap"><div class="brand-prog-fill" style="width:${bPct}%;background:${col}"></div></div>
        <div class="collapsed-summary">
          <span class="cs-pill cs-filled">■ ${bF}</span>
          <span class="cs-pill cs-empty">■ ${bT-bF} вільно</span>
          <span class="cs-dup" style="display:${dupMode?'inline':'none'};font-size:10px;padding:2px 8px;border-radius:10px;background:#fef9c3;color:#b45309;font-family:'DM Mono',monospace">⚑ ${bD}</span>
        </div>
        <span class="chevron">▾</span>
      </div>
      <div class="brand-body">`;
    for(const geo of sortedGeos){
      if(!DATA[brand][geo])continue;
      const cats=sortedCats.filter(c=>DATA[brand][geo][c]);
      if(!cats.length)continue;
      html+=`<div class="geo-sec"><div class="geo-lbl" style="--bcolor:${col}"><span class="geo-dot"></span>${esc(geo)}</div>`;
      for(const cat of cats){
        const slots=DATA[brand][geo][cat];
        const f=slots.filter(s=>s.filled).length;
        _tF+=f;_tE+=slots.length-f;
        html+=`<div class="cat-block">
          <div class="cat-hdr">
            <span class="cat-name">${esc(cat)}</span>
            <div class="cat-prog"><div class="cat-prog-fill" style="width:${Math.round(f/slots.length*100)}%"></div></div>
            <span class="cat-cnt">${f}/${slots.length}</span>
          </div><div class="slot-grid">`;
        for(const s of slots){
          if(s.filled){
            const isDup=dupSet.has(norm(s.game));
            const g=s.game.length>22?s.game.slice(0,21)+'…':s.game;
            const p=s.provider?s.provider.split('/')[0].trim().slice(0,14):'';
            html+=`<div class="slot filled${isDup?' is-dup':''}" style="--bcolor:${col}" title="${esc(s.placement)}">
              <div class="dup-badge">×${gameCount[norm(s.game)]}</div>
              <div class="slot-num">#${s.pos}</div>
              <div class="slot-site">${esc(s.placement_short)}</div>
              <div class="slot-game">${esc(g)}</div>
              ${p?`<div class="slot-prov">${esc(p)}</div>`:''}
            </div>`;
          }else{
            html+=`<div class="slot empty" title="${esc(s.placement)}">
              <div class="slot-num">#${s.pos}</div>
              <div class="slot-site">${esc(s.placement_short)}</div>
              <div class="slot-free">вільно</div>
            </div>`;
          }
        }
        html+=`</div></div>`;
      }
      html+=`</div>`;
    }
    html+=`</div></div>`;
  }
  document.getElementById('board').innerHTML=html||'<div class="empty-state">Немає даних для обраних фільтрів</div>';
  document.body.classList.toggle('dup-mode',dupMode);
  updateStat();
}

  for(const month of Object.keys(MONTH_GIDS)){
    const opt=document.createElement('option');
    opt.value=month;opt.textContent=month;
    if(month===currentMonth)opt.selected=true;
    sel.appendChild(opt);
  }
  loadMonth(currentMonth);
})();
</script>
