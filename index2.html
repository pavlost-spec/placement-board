<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Grid — Март 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--border:#e2e5ea;--text:#1a1d23;--muted:#8a929f;--accent:#6366f1}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity .3s}
.loader.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--muted);font-family:"DM Mono",monospace}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.08em}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.flabel{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:500;white-space:nowrap}
.refresh-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.refresh-btn:hover{border-color:#b0b7c3;color:var(--text)}
.statbar{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);margin-left:auto}
.sv{color:#374151;font-weight:600}.se{color:#16a34a;font-weight:600}

/* filter pills */
.pill{font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:#b0b7c3;color:var(--text)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.legend{display:flex;gap:10px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-box{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.leg-f{background:#e9eaec;border:1px solid #d1d5db}
.leg-e{background:#dcfce7;border:1px solid #86efac}
.leg-r{background:#fef9c3;border:1px solid #f59e0b}

/* MAIN */
.main{padding:20px 20px 60px}

/* PLACEMENT BLOCK */
.placement-block{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  margin-bottom:16px;overflow:hidden;
}
.placement-hdr{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:#fff;cursor:pointer;user-select:none;
  transition:background .12s;
}
.placement-hdr:hover{background:#f9fafb}
.placement-name{font-size:12px;font-weight:600;color:var(--text)}
.placement-meta{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}

/* LIVE / NOT SET badge */
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;letter-spacing:.04em;
  padding:3px 9px;border-radius:20px;
}
.live-badge.live{background:#dcfce7;color:#16a34a}
.live-badge.live::before{content:"";width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block}
.live-badge.notset{background:#f3f4f6;color:#9ca3af}
.live-badge.notset::before{content:"";width:6px;height:6px;border-radius:50%;background:#d1d5db;display:inline-block}
.live-badge.partial{background:#fef9c3;color:#b45309}
.live-badge.partial::before{content:"";width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block}

.chevron{font-size:11px;color:var(--muted);margin-left:auto;transition:transform .2s}
.placement-block.collapsed .chevron{transform:rotate(-90deg)}
.placement-body{overflow:hidden;transition:max-height .25s ease,opacity .2s,padding .2s;max-height:9999px;opacity:1;padding:14px 16px}
.placement-block.collapsed .placement-body{max-height:0;opacity:0;padding:0 16px}

/* 7x7 GRID */
.row-wrap{margin-bottom:6px}
.row-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-family:"DM Mono",monospace;margin-bottom:4px}
.slot-row{display:flex;gap:5px}

.slot{
  flex:1;min-height:66px;border-radius:6px;
  padding:7px 9px 7px 12px;position:relative;
  transition:transform .1s,box-shadow .1s;cursor:default;
}
.slot:hover{transform:translateY(-1px);z-index:2}

.slot.filled{background:#e9eaec;border:1px solid #d1d5db;border-left:3px solid #6366f1}
.slot.filled:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
.slot.filled .g{font-size:9px;font-weight:600;color:#1f2937;line-height:1.3;margin-top:1px}
.slot.filled .p{font-size:8px;color:#6b7280;font-family:"DM Mono",monospace;margin-top:2px}

.slot.empty{background:#dcfce7;border:1px solid #86efac;border-left:3px solid #22c55e}
.slot.empty .fr{font-size:9px;font-weight:600;color:#16a34a;margin-top:12px}

.slot.reserved{background:#fef9c3;border:1px solid #fcd34d;border-left:3px solid #f59e0b}
.slot.reserved .g{font-size:9px;font-weight:500;color:#92400e;margin-top:1px}

/* status dot on filled */
.sdot{position:absolute;top:6px;right:7px;width:5px;height:5px;border-radius:50%}
.sdot.ready{background:#22c55e}
.sdot.pending{background:#e5e7eb}

.pos{font-size:7px;font-family:"DM Mono",monospace;color:rgba(0,0,0,.2);margin-bottom:1px}

.error-msg{text-align:center;padding:60px;color:var(--muted);font-size:13px;font-family:"DM Mono",monospace;line-height:2}
.empty-state{text-align:center;padding:40px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Завантаження Март 2026...</div>
</div>

<div class="topbar">
  <div class="logo">♟ GRID / МАРТ 2026</div>
  <div class="sep"></div>
  <span class="flabel">Фільтр</span>
  <div style="display:flex;gap:4px" id="filterBtns">
    <button class="pill active" data-filter="all" onclick="setFilter('all',this)">Всі</button>
    <button class="pill" data-filter="live" onclick="setFilter('live',this)">LIVE</button>
    <button class="pill" data-filter="notset" onclick="setFilter('notset',this)">Not set</button>
    <button class="pill" data-filter="partial" onclick="setFilter('partial',this)">Частково</button>
  </div>
  <div class="sep"></div>
  <div class="legend">
    <div class="leg"><div class="leg-box leg-f"></div>Зайнято</div>
    <div class="leg"><div class="leg-box leg-e"></div>Вільно</div>
    <div class="leg"><div class="leg-box leg-r"></div>Резерв</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻</button>
  <div class="statbar" id="sb">—</div>
</div>

<div class="main" id="board"></div>

<script>
const PROXY='https://script.google.com/macros/s/AKfycbyoztFLuxotWSC6qIaYju8wjpl0yMt_sCHaMyiphvYkvcw_r9Hkz-2v0qMAHWQMOO1UrQ/exec', GID='198055218';
const SKIP_KW=['резерв','поставить','ella games','inout/ella'];
const ROWS=7, COLS=7;

let placements=[];
let collapsed=new Set();
let currentFilter='all';

function cleanVal(v){
  if(v===null||v===undefined)return'';
  v=String(v).trim();
  if(['','nan','null','undefined','#n/a'].includes(v.toLowerCase()))return'';
  if(/^\d+\.?\d*$/.test(v))return'';
  return v;
}
function shorten(n){
  return n.replace('NEOSPIN','NEO').replace('CROWNSLOTS','CROWN')
    .replace('GUNSBET','GUNS').replace('EVOSPIN','EVO')
    .replace('SLOTRUSH / BITSTAKE','SR/BS').replace('BEONBET','BOB')
    .replace('AUSTRALIA','AU').replace('GERMANY','DE').replace('CANADA','CA')
    .replace('NEW ZEALAND','NZ').replace(/\s*\(.*?\)/g,'').trim();
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function loadData(){
  document.getElementById('loader').classList.remove('hide');
  try{
    const res=await fetch(`${PROXY}?gid=${GID}`);
    const rows=await res.json();
    parseData(rows);
    render();
  }catch(e){
    document.getElementById('board').innerHTML=`<div class="error-msg">Помилка: ${e.message}</div>`;
  }
  document.getElementById('loader').classList.add('hide');
}

function parseData(rows){
  placements=[];
  const header=rows[0]||[];
  let rowCol=-1,placeCol=-1,statusCol=-1;
  const pCols=[];

  for(let i=0;i<header.length;i++){
    const h=String(header[i]||'').toLowerCase().trim();
    if(h==='row')rowCol=i;
    else if(h==='place')placeCol=i;
    else if(h.includes('сортировка')||h.includes('сортування'))statusCol=i;
  }

  // Find placement columns (after placeCol, non-empty, skip provider cols)
  let i=Math.max(rowCol,placeCol,statusCol)+1;
  while(i<header.length){
    const h=String(header[i]||'').trim();
    if(h&&!/^(game|provider|игра|провайдер)$/i.test(h)){
      pCols.push({name:h,gameCol:i,provCol:i+1});
      i+=3; // skip game, provider, empty
    } else i++;
  }

  // Parse slot data for each placement
  for(const pc of pCols){
    const slots=[];
    for(let r=1;r<rows.length;r++){
      const row=rows[r];
      const rn=parseInt(row[rowCol])||0;
      const pn=parseInt(row[placeCol])||0;
      if(!rn||!pn)continue;
      const status=cleanVal(row[statusCol]);
      const isReady=status.toLowerCase().includes('готово');
      const game=cleanVal(row[pc.gameCol]);
      const prov=cleanVal(row[pc.provCol]);
      const isRes=game&&SKIP_KW.some(k=>game.toLowerCase().includes(k));
      slots.push({row:rn,place:pn,game:isRes?'':game,provider:prov,reserved:isRes,ready:isReady});
    }

    // Determine placement status
    const total=ROWS*COLS;
    const filled=slots.filter(s=>s.game&&!s.reserved).length;
    const ready=slots.filter(s=>s.ready&&s.game).length;
    let liveStatus='notset';
    if(ready===filled&&filled>0)liveStatus='live';
    else if(ready>0)liveStatus='partial';

    placements.push({name:pc.name,slots,filled,total,liveStatus,readyCount:ready});
  }
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('#filterBtns .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleCollapse(name){
  const el=document.querySelector(`[data-placement="${CSS.escape(name)}"]`);
  if(!el)return;
  if(collapsed.has(name)){collapsed.delete(name);el.classList.remove('collapsed')}
  else{collapsed.add(name);el.classList.add('collapsed')}
}

function render(){
  const filtered=placements.filter(p=>{
    if(currentFilter==='all')return true;
    return p.liveStatus===currentFilter;
  });

  if(!filtered.length){
    document.getElementById('board').innerHTML='<div class="empty-state">Немає плейсментів для обраного фільтру</div>';
    updateStat();return;
  }

  let html='';
  for(const p of filtered){
    const isCol=collapsed.has(p.name);
    const liveLabel=p.liveStatus==='live'?'LIVE':p.liveStatus==='partial'?'Частково':'Not set';

    // Build matrix
    const matrix={};
    for(const s of p.slots)matrix[`${s.row}_${s.place}`]=s;

    let gridHtml='';
    for(let r=1;r<=ROWS;r++){
      gridHtml+=`<div class="row-wrap"><div class="row-label">Ряд ${r}</div><div class="slot-row">`;
      for(let pl=1;pl<=COLS;pl++){
        const s=matrix[`${r}_${pl}`];
        if(!s||(!s.game&&!s.reserved)){
          gridHtml+=`<div class="slot empty"><div class="pos">${r}.${pl}</div><div class="fr">вільно</div></div>`;
        } else if(s.reserved){
          gridHtml+=`<div class="slot reserved"><div class="pos">${r}.${pl}</div><div class="g">резерв</div></div>`;
        } else {
          const g=s.game.length>22?s.game.slice(0,21)+'…':s.game;
          const pv=s.provider?s.provider.split('/')[0].trim().slice(0,13):'';
          gridHtml+=`<div class="slot filled">
            <div class="sdot ${s.ready?'ready':'pending'}"></div>
            <div class="pos">${r}.${pl}</div>
            <div class="g">${esc(g)}</div>
            ${pv?`<div class="p">${esc(pv)}</div>`:''}
          </div>`;
        }
      }
      gridHtml+=`</div></div>`;
    }

    html+=`<div class="placement-block${isCol?' collapsed':''}" data-placement="${esc(p.name)}">
      <div class="placement-hdr" onclick="toggleCollapse('${p.name.replace(/'/g,"\'")}')">
        <span class="placement-name">${esc(shorten(p.name))}</span>
        <span class="placement-meta">${p.filled}/${p.total}</span>
        <span class="live-badge ${p.liveStatus}">${liveLabel}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="placement-body">${gridHtml}</div>
    </div>`;
  }

  document.getElementById('board').innerHTML=html;
  updateStat();
}

function updateStat(){
  const vis=placements.filter(p=>currentFilter==='all'||p.liveStatus===currentFilter);
  const tF=vis.reduce((a,p)=>a+p.filled,0);
  const tT=vis.reduce((a,p)=>a+p.total,0);
  const today=new Date().toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('sb').innerHTML=
    `<span class="sv">■ ${tF}/${tT}</span> · ${tT?Math.round(tF/tT*100):0}% · ${today}`;
}

loadData();
</script>
</body>
</html>
