<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Grid — Март 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--border:#e2e5ea;--text:#1a1d23;--muted:#8a929f;--accent:#6366f1}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity .3s}
.loader.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--muted);font-family:"DM Mono",monospace}

.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.08em}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.flabel{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:500;white-space:nowrap}
.refresh-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.refresh-btn:hover{border-color:#b0b7c3;color:var(--text)}
.statbar{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);margin-left:auto}
.sv{color:#374151;font-weight:600}.se{color:#16a34a;font-weight:600}

.pill{font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:#b0b7c3;color:var(--text)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.dup-btn{font-size:11px;font-weight:600;padding:4px 13px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.dup-btn:hover{border-color:#b0b7c3;color:var(--text)}
.dup-btn.on{background:#f59e0b;border-color:#f59e0b;color:#fff}

.legend{display:flex;gap:10px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-box{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.leg-f{background:#e9eaec;border:1px solid #d1d5db}
.leg-e{background:#dcfce7;border:1px solid #86efac}
.leg-r{background:#fef9c3;border:1px solid #f59e0b}

.main{padding:20px 20px 60px}

/* PROJECT GROUP */
.project-block{margin-bottom:24px}
.project-hdr{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;border-radius:6px;
  border-left:4px solid var(--bcolor,var(--accent));
  background:rgba(0,0,0,.025);margin-bottom:12px;
  cursor:pointer;user-select:none;
}
.project-hdr:hover{background:rgba(0,0,0,.04)}
.project-name{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--bcolor,var(--accent))}
.project-stat{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}
.proj-chevron{font-size:11px;color:var(--muted);margin-left:auto;transition:transform .2s}
.project-block.collapsed .proj-chevron{transform:rotate(-90deg)}
.project-body{overflow:hidden;transition:max-height .25s ease,opacity .2s;max-height:99999px;opacity:1}
.project-block.collapsed .project-body{max-height:0;opacity:0}

/* PLACEMENT BLOCK */
.placement-block{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  margin-bottom:10px;overflow:hidden;
}
.placement-hdr{
  display:flex;align-items:center;gap:10px;padding:11px 16px;
  background:#fff;cursor:pointer;user-select:none;transition:background .12s;
  border-left:3px solid var(--bcolor,var(--accent));
}
.placement-hdr:hover{background:#f9fafb}
.placement-name{font-size:12px;font-weight:500;color:var(--text)}
.placement-meta{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}

.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
.live-badge::before{content:"";width:6px;height:6px;border-radius:50%;display:inline-block}
.live-badge.live{background:#dcfce7;color:#16a34a}
.live-badge.live::before{background:#22c55e}
.live-badge.partial{background:#fef9c3;color:#b45309}
.live-badge.partial::before{background:#f59e0b}
.live-badge.notset{background:#f3f4f6;color:#9ca3af}
.live-badge.notset::before{background:#d1d5db}

.chevron{font-size:11px;color:var(--muted);margin-left:auto;transition:transform .2s}
.placement-block.collapsed .chevron{transform:rotate(-90deg)}
.placement-body{overflow:hidden;transition:max-height .25s ease,opacity .2s,padding .2s;max-height:9999px;opacity:1;padding:12px 16px}
.placement-block.collapsed .placement-body{max-height:0;opacity:0;padding:0 16px}

/* 7x7 GRID */
.row-wrap{margin-bottom:5px}
.row-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-family:"DM Mono",monospace;margin-bottom:5px}
.slot-row{display:flex;gap:5px}

.slot{flex:1;min-height:80px;border-radius:6px;padding:9px 11px 9px 14px;position:relative;transition:transform .1s,box-shadow .1s;cursor:default}
.slot:hover{transform:translateY(-1px);z-index:2}

.slot.filled{background:#e9eaec;border:1px solid #d1d5db;border-left:3px solid var(--bcolor,var(--accent))}
.slot.filled:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
.slot.filled .g{font-size:11px;font-weight:500;color:#374151;line-height:1.35;margin-top:2px}
.slot.filled .p{font-size:12px;font-weight:700;color:#111827;font-family:"DM Sans",sans-serif;margin-top:4px}

/* dup highlight — only in dup mode */
body.dup-mode .slot.filled.is-dup{background:#fef9c3;border-color:#f59e0b;border-left-color:#d97706}
body.dup-mode .slot.filled.is-dup .g{color:#92400e}
body.dup-mode .slot.filled:not(.is-dup){opacity:.3}
body.dup-mode .slot.empty{opacity:.3}
body.dup-mode .slot.reserved{opacity:.3}
.dup-badge{position:absolute;top:5px;left:5px;font-size:7px;font-weight:700;background:#f59e0b;color:#fff;border-radius:3px;padding:1px 4px;font-family:"DM Mono",monospace;opacity:0;pointer-events:none;transition:opacity .15s}
body.dup-mode .slot.filled.is-dup .dup-badge{opacity:1}

.slot.empty{background:#dcfce7;border:1px solid #86efac;border-left:3px solid #22c55e}
.slot.empty .fr{font-size:11px;font-weight:600;color:#16a34a;margin-top:14px}

.slot.reserved{background:#fef9c3;border:1px solid #fcd34d;border-left:3px solid #f59e0b}
.slot.reserved .g{font-size:11px;font-weight:500;color:#92400e;margin-top:2px}



.pos{font-size:9px;font-family:"DM Mono",monospace;color:rgba(0,0,0,.25);margin-bottom:2px}
.set-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:3px;font-family:"DM Mono",monospace;position:absolute;top:6px;right:7px}
.set-tag.set{background:#dcfce7;color:#16a34a}
.set-tag.notset{background:#f3f4f6;color:#9ca3af}

.shared-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;margin-left:6px;vertical-align:middle;font-family:"DM Mono",monospace}
.error-msg{text-align:center;padding:60px;color:var(--muted);font-size:13px;font-family:"DM Mono",monospace;line-height:2}
.empty-state{text-align:center;padding:40px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Loading...</div>
</div>

<div class="topbar">
  <div class="logo">♟ GRID</div>
  <select style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;outline:none" id="monthSel" onchange="switchMonth(this.value)"></select>
  <button onclick="addMonth()" style="font-size:13px;width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0" title="Додати місяць">+</button>
  <div class="sep"></div>
  <span class="flabel">Статус</span>
  <div style="display:flex;gap:4px" id="filterBtns">
    <button class="pill active" onclick="setFilter('all',this)">All</button>
    <button class="pill" onclick="setFilter('live',this)">LIVE</button>
    <button class="pill" onclick="setFilter('notset',this)">Not set</button>
    <button class="pill" onclick="setFilter('partial',this)">Partial</button>
  </div>
  <div class="sep"></div>
  <button class="dup-btn" id="dupBtn" onclick="toggleDups()">⚑ Dupes</button>
  <button class="refresh-btn" id="collapseBtn" onclick="collapseAll()">⊟ Collapse</button>
  <button class="refresh-btn" onclick="loadData()">↻</button>
  <div class="sep"></div>
  <div class="legend">
    <div class="leg"><div class="leg-box leg-f"></div>Filled</div>
    <div class="leg"><div class="leg-box leg-e"></div>Free</div>
    <div class="leg"><div class="leg-box leg-r"></div>Reserve</div>
  </div>
  <div class="statbar" id="sb">—</div>
</div>

<div class="main" id="board"></div>

<script>
const PROXY='https://script.google.com/macros/s/AKfycbyoztFLuxotWSC6qIaYju8wjpl0yMt_sCHaMyiphvYkvcw_r9Hkz-2v0qMAHWQMOO1UrQ/exec';
const DEFAULT_MONTHS={'Март 2026':'198055218','Квітень 2026':'811674113'};
function loadMonths(){try{const s=localStorage.getItem('placement_months');return s?JSON.parse(s):null;}catch(e){return null;}}
function saveMonths(m){try{localStorage.setItem('placement_months',JSON.stringify(m));}catch(e){}}
let MONTHS=loadMonths()||{...DEFAULT_MONTHS};
let GID=Object.values(MONTHS)[Object.values(MONTHS).length-1];
const SKIP_KW=['reserve','поставить','ella games','inout/ella'];
const ROWS=7, COLS=7;
const BC={Neospin:'#6366f1',Crownslots:'#ec4899',Gunsbet:'#0ea5e9',Evospin:'#f59e0b','SR/BitStake':'#10b981',BeOnBet:'#8b5cf6','1RedBet':'#ef4444',Promo:'#6b7280'};
function getBrandColor(proj){return BC[proj]||'#6b7280';}
const SS_BRANDS=['Neospin','Crownslots','Gunsbet','Evospin'];
const PROJECT_ORDER=['Neospin','Crownslots','Gunsbet','Evospin','SR/BitStake','BeOnBet','1RedBet'];

let placements=[];
let collapsedP=new Set(), collapsedProj=new Set();
let currentFilter='all', dupMode=false;

function cleanVal(v){
  if(v===null||v===undefined)return'';
  v=String(v).trim();
  if(['','nan','null','undefined','#n/a'].includes(v.toLowerCase()))return'';
  return v;
}
function isNumeric(v){return/^\d+\.?\d*$/.test(String(v).trim())}
function shorten(n){
  return n.replace('NEOSPIN','NEO').replace('CROWNSLOTS','CROWN')
    .replace('GUNSBET','GUNS').replace('EVOSPIN','EVO')
    .replace('SLOTRUSH / BITSTAKE','SR/BS').replace('BEONBET','BOB')
    .replace('AUSTRALIA','AU').replace('GERMANY','DE').replace('CANADA','CA')
    .replace('NEW ZEALAND','NZ').replace(/\s*\(.*?\)/g,'').trim();
}
function getProject(name){
  const u=name.toUpperCase();
  if(u.includes('NEOSPIN'))return'Neospin';
  if(u.includes('CROWNSLOTS'))return'Crownslots';
  if(u.includes('GUNSBET'))return'Gunsbet';
  if(u.includes('EVOSPIN'))return'Evospin';
  if(u.includes('SLOTRUSH')||u.includes('BITSTAKE'))return'SR/BitStake';
  if(u.includes('BEONBET'))return'BeOnBet';
  if(u.includes('1REDBET'))return'1RedBet';
  return'Promo';
}
// Strip "ALL SS ..." or "ALL Projects ..." prefix, keep only category name
function shortenShared(n){
  // Remove everything up to and including first – or — separator
  let s=n.replace(/^ALL\s+(?:SS|PROJECTS?)\s*[+\w\s]*[–\-—]+\s*/i,'').trim();
  if(!s||s===n){
    // fallback: remove first 2 words (ALL SS / ALL Projects)
    const parts=n.split(/\s+/);
    s=parts.slice(2).join(' ').trim()||n;
  }
  return s;
}
function norm(s){return s.toLowerCase().trim()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function addMonth(){
  const name=prompt('Month name (e.g. May 2026):');
  if(!name||!name.trim())return;
  const gid=prompt('Sheet GID (number from URL after gid=):');
  if(!gid||!/^\d+$/.test(gid.trim())){alert('GID must be a number');return;}
  MONTHS[name.trim()]=gid.trim();
  saveMonths(MONTHS);
  buildMonthSel();
  switchMonth(gid.trim());
}
function buildMonthSel(){
  const sel=document.getElementById('monthSel');
  if(!sel)return;
  sel.innerHTML='';
  for(const[name,gid]of Object.entries(MONTHS)){
    const opt=document.createElement('option');
    opt.value=gid;opt.textContent=name;
    if(gid===GID)opt.selected=true;
    sel.appendChild(opt);
  }
}
function switchMonth(gid){
  GID=gid;
  placements=[];
  collapsedP=new Set();collapsedProj=new Set();
  loadData();
}
async function loadData(){
  document.getElementById('loader').classList.remove('hide');
  try{
    const res=await fetch(`${PROXY}?gid=${GID}`);
    const rows=await res.json();
    parseData(rows);
    render();
  }catch(e){
    document.getElementById('board').innerHTML=`<div class="error-msg">Помилка: ${e.message}</div>`;
  }
  document.getElementById('loader').classList.add('hide');
}

function sharedType(name){
  const u=name.toUpperCase();
  if(u.startsWith('ALL SS'))return'allss';
  if(u.startsWith('ALL PROJECT'))return'allprojects';
  return null;
}
function sharedTargets(type){
  if(type==='allss')return SS_BRANDS;
  if(type==='allprojects')return PROJECT_ORDER;
  return[];
}
function parsePlacement(name){
  const locM=name.match(/\(([^)]+)\)/);
  const locales=locM?locM[1].split(',').map(s=>s.trim().toUpperCase()).filter(Boolean):[];
  const base=name.replace(/\s*\([^)]*\)/,'').trim();
  const words=base.split(/\s+/);
  const category=(words[words.length-1]||'').toUpperCase();
  const brandWord=(words[0]||'').toUpperCase();
  const BRAND_MAP={
    'NEOSPIN':'Neospin','CROWNSLOTS':'Crownslots','GUNSBET':'Gunsbet',
    'EVOSPIN':'Evospin','SLOTRUSH':'Slotrush','BITSTAKE':'Bitstake',
    'BEONBET':'Beonbet','1REDBET':'1redbet'
  };
  const brand=BRAND_MAP[brandWord]||brandWord;
  return{brand,category,locales};
}

function parseData(rows){
  placements=[];
  const header=rows[0]||[];
  const placeCol=6;

  // statusLookup: "brand_lower|CATEGORY|LOCALE" → bool (Готово)
  // For shared placements we also store ALL rows regardless of brand match
  const statusLookup=new Map();
  // Also build a category+locale lookup ignoring brand (for shared)
  // key: "CATEGORY|LOCALE" → bool
  const sharedStatusLookup=new Map();

  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    const a=cleanVal(row[0]),b=cleanVal(row[1]),cv=cleanVal(row[2]),e=cleanVal(row[4]);
    if(a&&b&&cv){
      const isReady=e.toLowerCase().includes('готово');
      const key=`${a.toLowerCase()}|${b.toUpperCase()}|${cv.toUpperCase()}`;
      if(!statusLookup.has(key))statusLookup.set(key,isReady);
      // shared lookup: category|locale → ready (any brand)
      const sKey=`${b.toUpperCase()}|${cv.toUpperCase()}`;
      if(!sharedStatusLookup.has(sKey))sharedStatusLookup.set(sKey,isReady);
      else if(isReady)sharedStatusLookup.set(sKey,true); // upgrade to ready if any brand has it
    }
  }

  const pList=[];
  let i=7;
  while(i<header.length){
    const h=String(header[i]||'').trim();
    if(h&&h.length>3){pList.push({name:h,gameCol:i,provCol:i+1});i+=3;}
    else{i++;}
  }

  // Compute status for a normal (branded) placement
  function computeBrandedStatus(name){
    const {brand,category,locales}=parsePlacement(name);
    const bKey=brand.toLowerCase();
    if(locales.length===0)return(statusLookup.get(`${bKey}|${category}|ALL`)||false)?'live':'notset';
    const results=locales.map(loc=>statusLookup.get(`${bKey}|${category}|${loc}`)||false);
    const done=results.filter(Boolean).length;
    if(done===locales.length)return'live';
    if(done>0)return'partial';
    return'notset';
  }

  // Compute status for a shared placement:
  // Extract category name from header (after stripping ALL SS/Projects prefix)
  // Then look up by CATEGORY|ALL in sharedStatusLookup
  function computeSharedStatus(name){
    const catName=shortenShared(name).toUpperCase();
    // Try exact category match with ALL locale
    const direct=sharedStatusLookup.get(`${catName}|ALL`);
    if(direct!==undefined)return direct?'live':'notset';
    // Try matching any key that starts with catName
    for(const[k,v]of sharedStatusLookup){
      if(k.startsWith(catName+'|'))return v?'live':'notset';
    }
    return'notset';
  }

  const slots_raw=[];
  let pos=0;
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    const hasGame=pList.some(p=>{const g=String(row[p.gameCol]||'').trim();return g.length>2;});
    const pv=String(row[placeCol]||'').trim();
    const hasPlace=/^[0-9]+$/.test(pv);
    if(!hasGame&&!hasPlace)continue;
    pos++;
    if(pos>ROWS*COLS)break;
    const rowNum=Math.ceil(pos/COLS);
    const placeNum=((pos-1)%COLS)+1;
    const slotData={row:rowNum,place:placeNum,games:{}};
    for(const p of pList){
      const game=cleanVal(row[p.gameCol]);
      const prov=cleanVal(row[p.provCol]);
      const isSkip=game&&SKIP_KW.some(k=>game.toLowerCase().includes(k));
      slotData.games[p.name]={game:isSkip?'':game,provider:prov,reserved:isSkip};
    }
    slots_raw.push(slotData);
  }

  for(const p of pList){
    const sType=sharedType(p.name);
    const liveStatus=sType?computeSharedStatus(p.name):computeBrandedStatus(p.name);
    const isReady=(liveStatus==='live');
    const slots=slots_raw.map(s=>({row:s.row,place:s.place,ready:isReady,...s.games[p.name]}));
    const filled=slots.filter(s=>s.game&&!s.reserved).length;
    const displayName=sType?shortenShared(p.name):shorten(p.name);

    if(sType){
      for(const brand of sharedTargets(sType)){
        placements.push({name:p.name,displayName,project:brand,slots,filled,
          total:ROWS*COLS,liveStatus,readyCount:isReady?filled:0,
          shared:true,sharedLabel:sType==='allss'?'SS':'ALL'});
      }
    } else {
      placements.push({name:p.name,displayName,project:getProject(p.name),slots,filled,
        total:ROWS*COLS,liveStatus,readyCount:isReady?filled:0,shared:false,sharedLabel:null});
    }
  }
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('#filterBtns .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleDups(){
  dupMode=!dupMode;
  const btn=document.getElementById('dupBtn');
  btn.classList.toggle('on',dupMode);
  btn.textContent=dupMode?'⚑ Dupes ON':'⚑ Dupes';
  document.body.classList.toggle('dup-mode',dupMode);
}

function toggleP(name){
  const el=document.querySelector(`.placement-block[data-p="${CSS.escape(name)}"]`);
  if(!el)return;
  if(collapsedP.has(name)){collapsedP.delete(name);el.classList.remove('collapsed')}
  else{collapsedP.add(name);el.classList.add('collapsed')}
}
function toggleProj(proj){
  const el=document.querySelector(`.project-block[data-proj="${CSS.escape(proj)}"]`);
  if(!el)return;
  if(collapsedProj.has(proj)){collapsedProj.delete(proj);el.classList.remove('collapsed')}
  else{collapsedProj.add(proj);el.classList.add('collapsed')}
}

function renderGrid(p,dupSet){
  const matrix={};
  for(const s of p.slots)matrix[`${s.row}_${s.place}`]=s;
  let html='';
  for(let r=1;r<=ROWS;r++){
    html+=`<div class="row-wrap"><div class="row-label">Row ${r}</div><div class="slot-row">`;
    for(let pl=1;pl<=COLS;pl++){
      const s=matrix[`${r}_${pl}`];
      if(!s||(!s.game&&!s.reserved)){
        html+=`<div class="slot empty"><div class="pos">${r}.${pl}</div><div class="fr">free</div></div>`;
      } else if(s.reserved){
        html+=`<div class="slot reserved"><div class="pos">${r}.${pl}</div><div class="g">reserve</div></div>`;
      } else {
        const isDup=dupSet&&dupSet.has(norm(s.game));
        const g=s.game.length>22?s.game.slice(0,21)+'…':s.game;
        const pv=s.provider?s.provider.split('/')[0].trim().slice(0,18):'';
        html+=`<div class="slot filled${isDup?' is-dup':''}" style="--bcolor:${getBrandColor(p.project)}">
          ${isDup?`<div class="dup-badge">×${dupSet.get(norm(s.game))}</div>`:''}
          ${s.ready?'<span class="set-tag set">SET</span>':'<span class="set-tag notset">NOT SET</span>'}
          <div class="pos">${r}.${pl}</div>
          <div class="g">${esc(g)}</div>
          ${pv?`<div class="p">${esc(pv)}</div>`:''}
        </div>`;
      }
    }
    html+=`</div></div>`;
  }
  return html;
}

function render(){
  // Group by project
  const groups={};
  for(const p of placements){
    if(currentFilter!=='all'&&p.liveStatus!==currentFilter)continue;
    if(!groups[p.project])groups[p.project]=[];
    groups[p.project].push(p);
  }

  // Build dup maps per project (count across all slots of all placements in project)
  const projDupMaps={};
  for(const proj of Object.keys(groups)){
    const gameCount=new Map();
    for(const p of groups[proj]){
      for(const s of p.slots){
        if(s.game&&!s.reserved){
          const k=norm(s.game);
          gameCount.set(k,(gameCount.get(k)||0)+1);
        }
      }
    }
    // Keep only dups (count > 1)
    const dupMap=new Map();
    for(const[k,v]of gameCount)if(v>1)dupMap.set(k,v);
    projDupMaps[proj]=dupMap;
  }

  let html='';
  let tF=0,tT=0;

  const projOrder=[...PROJECT_ORDER,...Object.keys(groups).filter(p=>!PROJECT_ORDER.includes(p))];
  
  for(const proj of projOrder){
    if(!groups[proj])continue;
    const col=getBrandColor(proj);
    const pOwn=groups[proj].filter(p=>!p.shared);
    const pF=pOwn.reduce((a,p)=>a+p.filled,0);
    const pT=pOwn.reduce((a,p)=>a+p.total,0);
    tF+=pF;tT+=pT;
    const pLive=groups[proj].filter(p=>p.liveStatus==='live').length;
    const pAll=groups[proj].length;
    const setColor=pLive===pAll&&pAll>0?'#16a34a':pLive>0?'#b45309':'#9ca3af';
    const isColProj=collapsedProj.has(proj);

    html+=`<div class="project-block${isColProj?' collapsed':''}" data-proj="${esc(proj)}">
      <div class="project-hdr" style="--bcolor:${col}" onclick="toggleProj('${proj}')">
        <span class="project-name">${esc(proj)}</span>
        <span class="project-stat">${pF}/${pT} slots · <span style="color:${setColor};font-weight:600">${pLive}/${pAll} set</span></span>
        <span class="proj-chevron">▾</span>
      </div>
      <div class="project-body">`;

    const dupMap=projDupMaps[proj];
    for(const p of groups[proj]){
      const isColP=collapsedP.has(p.name);
      const liveLabel=p.liveStatus==='live'?'LIVE':p.liveStatus==='partial'?'Partial':'Not set';
      const pKey=p.shared?`${p.project}__${p.name}`:p.name;
      html+=`<div class="placement-block${isColP?' collapsed':''}" data-p="${esc(pKey)}">
        <div class="placement-hdr" style="--bcolor:${col}" onclick="toggleP('${pKey.replace(/'/g,"\'")}')">
          <span class="placement-name">${esc(p.displayName)}${p.sharedLabel?`<span class="shared-badge">${p.sharedLabel}</span>`:''}</span>
          <span class="placement-meta">${p.filled}/${p.total}</span>
          <span class="live-badge ${p.liveStatus}">${liveLabel}</span>
          <span class="chevron">▾</span>
        </div>
        <div class="placement-body">${renderGrid(p,dupMode?dupMap:null)}</div>
      </div>`;
    }
    html+=`</div></div>`;
  }

  if(!html)html='<div class="empty-state">No placements for selected filter</div>';
  document.getElementById('board').innerHTML=html;

  const today=new Date().toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('sb').innerHTML=
    `<span class="sv">■ ${tF}/${tT}</span> · ${tT?Math.round(tF/tT*100):0}% · ${today}`;
}

function collapseAll(){
  const anyOpen=document.querySelectorAll('.project-block:not(.collapsed)').length>0;
  const btn=document.getElementById('collapseBtn');
  if(anyOpen){
    document.querySelectorAll('.project-block').forEach(el=>{collapsedProj.add(el.dataset.proj);el.classList.add('collapsed');});
    document.querySelectorAll('.placement-block').forEach(el=>{collapsedP.add(el.dataset.p);el.classList.add('collapsed');});
    btn.textContent='⊞ Expand';
  } else {
    document.querySelectorAll('.project-block').forEach(el=>{collapsedProj.delete(el.dataset.proj);el.classList.remove('collapsed');});
    document.querySelectorAll('.placement-block').forEach(el=>{collapsedP.delete(el.dataset.p);el.classList.remove('collapsed');});
    btn.textContent='⊟ Collapse';
  }
}
buildMonthSel();
loadData();
</script>
