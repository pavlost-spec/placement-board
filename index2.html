<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Grid — Март 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--border:#e2e5ea;--text:#1a1d23;--muted:#8a929f;--accent:#6366f1}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999;transition:opacity .3s}
.loader.hide{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--muted);font-family:"DM Mono",monospace}

.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.logo{font-family:"DM Mono",monospace;font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.08em}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
.flabel{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:500;white-space:nowrap}
.refresh-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.refresh-btn:hover{border-color:#b0b7c3;color:var(--text)}
.statbar{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);margin-left:auto}
.sv{color:#374151;font-weight:600}.se{color:#16a34a;font-weight:600}

.pill{font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.pill:hover{border-color:#b0b7c3;color:var(--text)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.dup-btn{font-size:11px;font-weight:600;padding:4px 13px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.dup-btn:hover{border-color:#b0b7c3;color:var(--text)}
.dup-btn.on{background:#f59e0b;border-color:#f59e0b;color:#fff}

.legend{display:flex;gap:10px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-box{width:13px;height:13px;border-radius:3px;flex-shrink:0}
.leg-f{background:#e9eaec;border:1px solid #d1d5db}
.leg-e{background:#dcfce7;border:1px solid #86efac}
.leg-r{background:#fef9c3;border:1px solid #f59e0b}

.main{padding:20px 20px 60px}

/* PROJECT GROUP */
.project-block{margin-bottom:24px}
.project-hdr{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;border-radius:6px;
  border-left:4px solid var(--bcolor,var(--accent));
  background:rgba(0,0,0,.025);margin-bottom:12px;
  cursor:pointer;user-select:none;
}
.project-hdr:hover{background:rgba(0,0,0,.04)}
.project-name{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--bcolor,var(--accent))}
.project-stat{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}
.proj-chevron{font-size:11px;color:var(--muted);margin-left:auto;transition:transform .2s}
.project-block.collapsed .proj-chevron{transform:rotate(-90deg)}
.project-body{overflow:hidden;transition:max-height .25s ease,opacity .2s;max-height:99999px;opacity:1}
.project-block.collapsed .project-body{max-height:0;opacity:0}

/* PLACEMENT BLOCK */
.placement-block{
  background:#fff;border:1px solid var(--border);border-radius:10px;
  margin-bottom:10px;overflow:hidden;
}
.placement-hdr{
  display:flex;align-items:center;gap:10px;padding:11px 16px;
  background:#fff;cursor:pointer;user-select:none;transition:background .12s;
  border-left:3px solid var(--bcolor,var(--accent));
}
.placement-hdr:hover{background:#f9fafb}
.placement-name{font-size:12px;font-weight:500;color:var(--text)}
.placement-meta{font-size:11px;color:var(--muted);font-family:"DM Mono",monospace}

.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
.live-badge::before{content:"";width:6px;height:6px;border-radius:50%;display:inline-block}
.live-badge.live{background:#dcfce7;color:#16a34a}
.live-badge.live::before{background:#22c55e}
.live-badge.partial{background:#fef9c3;color:#b45309}
.live-badge.partial::before{background:#f59e0b}
.live-badge.notset{background:#f3f4f6;color:#9ca3af}
.live-badge.notset::before{background:#d1d5db}

.chevron{font-size:11px;color:var(--muted);margin-left:auto;transition:transform .2s}
.placement-block.collapsed .chevron{transform:rotate(-90deg)}
.placement-body{overflow:hidden;transition:max-height .25s ease,opacity .2s,padding .2s;max-height:9999px;opacity:1;padding:12px 16px}
.placement-block.collapsed .placement-body{max-height:0;opacity:0;padding:0 16px}

/* 7x7 GRID */
.row-wrap{margin-bottom:5px}
.row-label{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-family:"DM Mono",monospace;margin-bottom:3px}
.slot-row{display:flex;gap:5px}

.slot{flex:1;min-height:64px;border-radius:6px;padding:7px 9px 7px 12px;position:relative;transition:transform .1s,box-shadow .1s;cursor:default}
.slot:hover{transform:translateY(-1px);z-index:2}

.slot.filled{background:#e9eaec;border:1px solid #d1d5db;border-left:3px solid var(--bcolor,var(--accent))}
.slot.filled:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
.slot.filled .g{font-size:9px;font-weight:600;color:#1f2937;line-height:1.3;margin-top:1px}
.slot.filled .p{font-size:8px;color:#6b7280;font-family:"DM Mono",monospace;margin-top:2px}

/* dup highlight — only in dup mode */
body.dup-mode .slot.filled.is-dup{background:#fef9c3;border-color:#f59e0b;border-left-color:#d97706}
body.dup-mode .slot.filled.is-dup .g{color:#92400e}
body.dup-mode .slot.filled:not(.is-dup){opacity:.3}
body.dup-mode .slot.empty{opacity:.3}
body.dup-mode .slot.reserved{opacity:.3}
.dup-badge{position:absolute;top:5px;left:5px;font-size:7px;font-weight:700;background:#f59e0b;color:#fff;border-radius:3px;padding:1px 4px;font-family:"DM Mono",monospace;opacity:0;pointer-events:none;transition:opacity .15s}
body.dup-mode .slot.filled.is-dup .dup-badge{opacity:1}

.slot.empty{background:#dcfce7;border:1px solid #86efac;border-left:3px solid #22c55e}
.slot.empty .fr{font-size:9px;font-weight:600;color:#16a34a;margin-top:12px}

.slot.reserved{background:#fef9c3;border:1px solid #fcd34d;border-left:3px solid #f59e0b}
.slot.reserved .g{font-size:9px;font-weight:500;color:#92400e;margin-top:1px}

.sdot{position:absolute;top:6px;right:7px;width:5px;height:5px;border-radius:50%}
.sdot.ready{background:#22c55e}
.sdot.pending{background:#e5e7eb}

.pos{font-size:7px;font-family:"DM Mono",monospace;color:rgba(0,0,0,.2);margin-bottom:1px}

.error-msg{text-align:center;padding:60px;color:var(--muted);font-size:13px;font-family:"DM Mono",monospace;line-height:2}
.empty-state{text-align:center;padding:40px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Завантаження Март 2026...</div>
</div>

<div class="topbar">
  <div class="logo">♟ GRID</div>
  <select style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;outline:none" id="monthSel" onchange="switchMonth(this.value)"></select>
  <button onclick="addMonth()" style="font-size:13px;width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0" title="Додати місяць">+</button>
  <div class="sep"></div>
  <span class="flabel">Статус</span>
  <div style="display:flex;gap:4px" id="filterBtns">
    <button class="pill active" onclick="setFilter('all',this)">Всі</button>
    <button class="pill" onclick="setFilter('live',this)">LIVE</button>
    <button class="pill" onclick="setFilter('notset',this)">Not set</button>
    <button class="pill" onclick="setFilter('partial',this)">Частково</button>
  </div>
  <div class="sep"></div>
  <button class="dup-btn" id="dupBtn" onclick="toggleDups()">⚑ Повтори</button>
  <button class="refresh-btn" onclick="loadData()">↻</button>
  <div class="sep"></div>
  <div class="legend">
    <div class="leg"><div class="leg-box leg-f"></div>Зайнято</div>
    <div class="leg"><div class="leg-box leg-e"></div>Вільно</div>
    <div class="leg"><div class="leg-box leg-r"></div>Резерв</div>
  </div>
  <div class="statbar" id="sb">—</div>
</div>

<div class="main" id="board"></div>

<script>
const PROXY='https://script.google.com/macros/s/AKfycbyoztFLuxotWSC6qIaYju8wjpl0yMt_sCHaMyiphvYkvcw_r9Hkz-2v0qMAHWQMOO1UrQ/exec', GID='198055218';
const SKIP_KW=['резерв','поставить','ella games','inout/ella'];
const ROWS=7, COLS=7;
const BC={Neospin:'#6366f1',Crownslots:'#ec4899',Gunsbet:'#0ea5e9',Evospin:'#f59e0b'};
const PROJECT_ORDER=['Neospin','Crownslots','Gunsbet','Evospin'];

let placements=[];
let collapsedP=new Set(), collapsedProj=new Set();
let currentFilter='all', dupMode=false;

function cleanVal(v){
  if(v===null||v===undefined)return'';
  v=String(v).trim();
  if(['','nan','null','undefined','#n/a'].includes(v.toLowerCase()))return'';
  return v;
}
function isNumeric(v){return/^\d+\.?\d*$/.test(String(v).trim())}
function shorten(n){
  return n.replace('NEOSPIN','NEO').replace('CROWNSLOTS','CROWN')
    .replace('GUNSBET','GUNS').replace('EVOSPIN','EVO')
    .replace('SLOTRUSH / BITSTAKE','SR/BS').replace('BEONBET','BOB')
    .replace('AUSTRALIA','AU').replace('GERMANY','DE').replace('CANADA','CA')
    .replace('NEW ZEALAND','NZ').replace(/\s*\(.*?\)/g,'').trim();
}
function getProject(name){
  const u=name.toUpperCase();
  if(u.includes('NEOSPIN'))return'Neospin';
  if(u.includes('CROWNSLOTS'))return'Crownslots';
  if(u.includes('GUNSBET'))return'Gunsbet';
  if(u.includes('EVOSPIN'))return'Evospin';
  if(u.includes('SLOTRUSH')||u.includes('BITSTAKE'))return'SR/BitStake';
  if(u.includes('BEONBET'))return'BeOnBet';
  return'Інші';
}
function norm(s){return s.toLowerCase().trim()}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function addMonth(){
  const name=prompt('Назва місяця (напр. Травень 2026):');
  if(!name||!name.trim())return;
  const gid=prompt('GID листа (число з URL після gid=):');
  if(!gid||!/^\d+$/.test(gid.trim())){alert('GID має бути числом');return;}
  MONTHS[name.trim()]=gid.trim();
  saveMonths(MONTHS);
  buildMonthSel();
  switchMonth(gid.trim());
}
function buildMonthSel(){
  const sel=document.getElementById('monthSel');
  if(!sel)return;
  sel.innerHTML='';
  for(const[name,gid]of Object.entries(MONTHS)){
    const opt=document.createElement('option');
    opt.value=gid;opt.textContent=name;
    if(gid===GID)opt.selected=true;
    sel.appendChild(opt);
  }
}
function switchMonth(gid){
  GID=gid;
  placements=[];
  collapsedP=new Set();collapsedProj=new Set();
  loadData();
}
async function loadData(){
  document.getElementById('loader').classList.remove('hide');
  try{
    const res=await fetch(`${PROXY}?gid=${GID}`);
    const rows=await res.json();
    parseData(rows);
    render();
  }catch(e){
    document.getElementById('board').innerHTML=`<div class="error-msg">Помилка: ${e.message}</div>`;
  }
  document.getElementById('loader').classList.add('hide');
}

function parseData(rows){
  placements=[];
  const header=rows[0]||[];

  // Find F=row col, G=place col by position (they have no text header, just numbers)
  // F and G are after col E (index 4), so index 5 and 6
  const rowCol=5, placeCol=6;
  
  // Status col = E (index 4) — "Сортировка в БО"
  const statusCol=4;

  // Placement columns start at H (index 7)
  // Pattern: colH=placementName (header row), colH+1=empty(provider header?), colI=provider
  // Actually: H=game, I=provider, J=empty separator, K=game, L=provider, M=empty...
  // But header row 0: H="NEOSPIN AUSTRALIA Top...", I=empty, J=empty, K="NEOSPIN GERMANY...", etc.
  
  // Find placement headers: non-empty cells in header row starting from index 7
  const pList=[];
  let i=7;
  while(i<header.length){
    const h=String(header[i]||'').trim();
    if(h&&h.length>3){
      // This is a placement name. Game=col i, Provider=col i+1
      pList.push({name:h,gameCol:i+1,provCol:i+2});
      i+=3; // game + provider + separator
    } else {
      i++;
    }
  }

  // Sequential position counting — ignore merged cells entirely
  // Each row with game data = next position (1..49), row=ceil(pos/7), place=((pos-1)%7)+1
  const slots_raw=[];
  let pos=0;
  for(let r=1;r<rows.length;r++){
    const row=rows[r];
    const hasGame=pList.some(p=>{const g=String(row[p.gameCol]||'').trim();return g.length>0;});
    const pv=String(row[placeCol]||'').trim();
    const hasPlace=/^\d+$/.test(pv);
    if(!hasGame&&!hasPlace)continue;
    pos++;
    if(pos>ROWS*COLS)break;
    const rowNum=Math.ceil(pos/COLS);
    const placeNum=((pos-1)%COLS)+1;
    const status=cleanVal(row[statusCol]);
    const isReady=status.toLowerCase().includes('готово');
    const slotData={row:rowNum,place:placeNum,ready:isReady,games:{}};
    for(const p of pList){
      const game=cleanVal(row[p.gameCol]);
      const prov=cleanVal(row[p.provCol]);
      const isSkip=game&&SKIP_KW.some(k=>game.toLowerCase().includes(k));
      slotData.games[p.name]={game:isSkip?'':game,provider:prov,reserved:isSkip};
    }
    slots_raw.push(slotData);
  }

  // Build per-placement data
  for(const p of pList){
    const slots=slots_raw.map(s=>({
      row:s.row,place:s.place,ready:s.ready,
      ...s.games[p.name]
    }));
    const filled=slots.filter(s=>s.game&&!s.reserved).length;
    const readyCount=slots.filter(s=>s.ready&&s.game&&!s.reserved).length;
    let liveStatus='notset';
    if(filled>0&&readyCount===filled)liveStatus='live';
    else if(readyCount>0)liveStatus='partial';
    placements.push({name:p.name,project:getProject(p.name),slots,filled,total:ROWS*COLS,liveStatus,readyCount});
  }
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('#filterBtns .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleDups(){
  dupMode=!dupMode;
  const btn=document.getElementById('dupBtn');
  btn.classList.toggle('on',dupMode);
  btn.textContent=dupMode?'⚑ Повтори ON':'⚑ Повтори';
  document.body.classList.toggle('dup-mode',dupMode);
}

function toggleP(name){
  const el=document.querySelector(`.placement-block[data-p="${CSS.escape(name)}"]`);
  if(!el)return;
  if(collapsedP.has(name)){collapsedP.delete(name);el.classList.remove('collapsed')}
  else{collapsedP.add(name);el.classList.add('collapsed')}
}
function toggleProj(proj){
  const el=document.querySelector(`.project-block[data-proj="${CSS.escape(proj)}"]`);
  if(!el)return;
  if(collapsedProj.has(proj)){collapsedProj.delete(proj);el.classList.remove('collapsed')}
  else{collapsedProj.add(proj);el.classList.add('collapsed')}
}

function renderGrid(p,dupSet){
  const matrix={};
  for(const s of p.slots)matrix[`${s.row}_${s.place}`]=s;
  let html='';
  for(let r=1;r<=ROWS;r++){
    html+=`<div class="row-wrap"><div class="row-label">Ряд ${r}</div><div class="slot-row">`;
    for(let pl=1;pl<=COLS;pl++){
      const s=matrix[`${r}_${pl}`];
      if(!s||(!s.game&&!s.reserved)){
        html+=`<div class="slot empty"><div class="pos">${r}.${pl}</div><div class="fr">вільно</div></div>`;
      } else if(s.reserved){
        html+=`<div class="slot reserved"><div class="pos">${r}.${pl}</div><div class="g">резерв</div></div>`;
      } else {
        const isDup=dupSet&&dupSet.has(norm(s.game));
        const g=s.game.length>22?s.game.slice(0,21)+'…':s.game;
        const pv=s.provider?s.provider.split('/')[0].trim().slice(0,13):'';
        html+=`<div class="slot filled${isDup?' is-dup':''}" style="--bcolor:${BC[p.project]||'#6366f1'}">
          ${isDup?`<div class="dup-badge">×${dupSet.get(norm(s.game))}</div>`:''}
          <div class="sdot ${s.ready?'ready':'pending'}"></div>
          <div class="pos">${r}.${pl}</div>
          <div class="g">${esc(g)}</div>
          ${pv?`<div class="p">${esc(pv)}</div>`:''}
        </div>`;
      }
    }
    html+=`</div></div>`;
  }
  return html;
}

function render(){
  // Group by project
  const groups={};
  for(const p of placements){
    if(currentFilter!=='all'&&p.liveStatus!==currentFilter)continue;
    if(!groups[p.project])groups[p.project]=[];
    groups[p.project].push(p);
  }

  // Build dup maps per project (count across all slots of all placements in project)
  const projDupMaps={};
  for(const proj of Object.keys(groups)){
    const gameCount=new Map();
    for(const p of groups[proj]){
      for(const s of p.slots){
        if(s.game&&!s.reserved){
          const k=norm(s.game);
          gameCount.set(k,(gameCount.get(k)||0)+1);
        }
      }
    }
    // Keep only dups (count > 1)
    const dupMap=new Map();
    for(const[k,v]of gameCount)if(v>1)dupMap.set(k,v);
    projDupMaps[proj]=dupMap;
  }

  let html='';
  let tF=0,tT=0;

  const projOrder=[...PROJECT_ORDER,...Object.keys(groups).filter(p=>!PROJECT_ORDER.includes(p))];
  
  for(const proj of projOrder){
    if(!groups[proj])continue;
    const col=BC[proj]||'#6366f1';
    const pF=groups[proj].reduce((a,p)=>a+p.filled,0);
    const pT=groups[proj].reduce((a,p)=>a+p.total,0);
    tF+=pF;tT+=pT;
    const isColProj=collapsedProj.has(proj);

    html+=`<div class="project-block${isColProj?' collapsed':''}" data-proj="${esc(proj)}">
      <div class="project-hdr" style="--bcolor:${col}" onclick="toggleProj('${proj}')">
        <span class="project-name">${esc(proj)}</span>
        <span class="project-stat">${pF}/${pT} · ${Math.round(pF/pT*100)}%</span>
        <span class="proj-chevron">▾</span>
      </div>
      <div class="project-body">`;

    const dupMap=projDupMaps[proj];
    for(const p of groups[proj]){
      const isColP=collapsedP.has(p.name);
      const liveLabel=p.liveStatus==='live'?'LIVE':p.liveStatus==='partial'?'Частково':'Not set';
      html+=`<div class="placement-block${isColP?' collapsed':''}" data-p="${esc(p.name)}">
        <div class="placement-hdr" style="--bcolor:${col}" onclick="toggleP('${p.name.replace(/'/g,"\'")}')">
          <span class="placement-name">${esc(shorten(p.name))}</span>
          <span class="placement-meta">${p.filled}/${p.total}</span>
          <span class="live-badge ${p.liveStatus}">${liveLabel}</span>
          <span class="chevron">▾</span>
        </div>
        <div class="placement-body">${renderGrid(p,dupMode?dupMap:null)}</div>
      </div>`;
    }
    html+=`</div></div>`;
  }

  if(!html)html='<div class="empty-state">Немає плейсментів для обраного фільтру</div>';
  document.getElementById('board').innerHTML=html;

  const today=new Date().toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('sb').innerHTML=
    `<span class="sv">■ ${tF}/${tT}</span> · ${tT?Math.round(tF/tT*100):0}% · ${today}`;
}

buildMonthSel();
loadData();
</script>
</body>
</html>
